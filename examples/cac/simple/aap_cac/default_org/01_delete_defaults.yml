tbd_controller_execution_environments_default_org:
  - name: Default execution environment
    organization: Default
    image: null
    state: absent
  - name: Minimal execution environment
    organization: Default
    image: null
    state: absent
  - name: Hub Default execution environment
    organization: Default
    image: null
    state: absent
  - name: Hub Minimal execution environment
    organization: Default
    image: null
    state: absent

tbd_eda_credentials_default_org:
  - name: Hub Decision Environment Container Registry
    organization: Default
    credential_type: Container Registry
    state: absent

tbd_eda_decision_environments_default_org:
  - name: Default Decision Environment
    organization: Default
    state: absent
  - name: Hub Default Decision Environment
    organization: Default
    state: absent

