# Ansible Automation Platform configuration - defaults deletion

controller_templates_default_org:
  - name: Demo Job Template
    organization: Default
    state: absent

controller_projects_default_org:
  - name: Demo Project
    organization: Default
    state: absent

controller_inventories_default_org:
  - name: Demo Inventory
    organization: Default
    state: absent

controller_credentials_default_org:
  # Managed credentials cannot be deleted
  #- name: Ansible Galaxy
  #  organization: null
  #  credential_type: Ansible Galaxy/Automation Hub API Token
  #  state: absent
  - name: Demo Credential
    organization: null
    credential_type: Machine
    state: absent
  - name: Demo Credential
    organization: Default
    credential_type: Machine
    state: absent

