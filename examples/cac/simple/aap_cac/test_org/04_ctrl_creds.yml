controller_credentials_test_org:
  - name: Automation Hub Collections Certified Repository
    organization: Test Org
    credential_type: Ansible Galaxy/Automation Hub API Token
    inputs:
      url: https://{{ aap_hostname }}/api/galaxy/content/rh-certified/
      token: "{{ hub_token }}"
  - name: Automation Hub Collections Validated Repository
    organization: Test Org
    credential_type: Ansible Galaxy/Automation Hub API Token
    inputs:
      url: https://{{ aap_hostname }}/api/galaxy/content/validated/
      token: "{{ hub_token }}"
  - name: Automation Hub Collections Community Repository
    organization: Test Org
    credential_type: Ansible Galaxy/Automation Hub API Token
    inputs:
      url: https://{{ aap_hostname }}/api/galaxy/content/community/
      token: "{{ hub_token }}"
  - name: Automation Hub Collections Published Repository
    organization: Test Org
    credential_type: Ansible Galaxy/Automation Hub API Token
    inputs:
      url: https://{{ aap_hostname }}/api/galaxy/content/published/
      token: "{{ hub_token }}"

  - name: Automation Hub Container Registry
    organization: Test Org
    credential_type: Container Registry
    inputs:
      host: "{{ aap_hostname }}"
      username: "{{ aap_username }}"
      password: "{{ aap_password }}"

  - name: Test Org SCM Credential
    organization: Test Org
    credential_type: Source Control
    inputs:
      username: "{{ test_scm_username | default('admin') }}"
      password: "{{ test_scm_password | default('Foobar_12') }}"
      #ssh_key_data: "{{ lookup('file', lookup('env', 'AAP_KEYS') + '/id_ed25519.scm') }}"
      #ssh_key_unlock: "{{ ssh_key_passphrase | default(omit) }}"

  - name: Test Credential
    organization: Test Org
    credential_type: Machine
    inputs:
      username: "{{ test_machine_username | default('admin') }}"
      password: "{{ test_machine_password | default('Foobar_12') }}"
      #ssh_key_data: "{{ lookup('file', lookup('env', 'AAP_KEYS') + '/id_ed25519.machine') }}"
      #ssh_key_unlock: "{{ ssh_key_passphrase | default(omit) }}"
