aap_organizations_test_org:
  - name: Test Org
    description: Test organization

    max_hosts: 10
    instance_groups:
      - executionplane
    default_environment: Test Org - Custom Base EE
    # NB. At least one credential needs to be
    #     defined if downloading collections.
    galaxy_credentials:
      - Test Org - Automation Hub Collections Certified Repository
      - Test Org - Automation Hub Collections Validated Repository
      - Test Org - Automation Hub Collections Community Repository
      - Test Org - Automation Hub Collections Published Repository

# NB. Team names must be unique across AAP
controller_instance_groups_test_org_default:
  - name: executionplane
    roles:
      use:
        teams:
          - t_developers
          - t_operators

controller_execution_environments_test_org:
  - name: Test Org - Custom Base EE
    organization: Test Org
    image: "{{ aap_hostname }}/custom/custom-base-rhel9"
    #credential: Test Org - Automation Hub Container Registry
    pull: never

  - name: Test Org - Custom Full EE
    organization: Test Org
    image: "{{ aap_hostname }}/custom/custom-full-rhel9"
    #credential: Test Org - Automation Hub Container Registry
    pull: never

controller_projects_test_org:
  - name: Test Org - Test Project for Git Inventory
    description: Inventory project for testing
    organization: Test Org
    default_environment: Control Plane Execution Environment
    scm_type: git
    scm_url: https://github.com/myllynen/autotest.git
    #credential: Test Org - SCM Credential
    scm_clean: false
    scm_update_on_launch: false
    #scm_update_cache_timeout: 30
    update_project: "{{ aap_scm_update_projects | default(false) }}"

  - name: Test Org - Test Project
    description: Project for testing
    organization: Test Org
    default_environment: Test Org - Custom Base EE
    scm_type: git
    scm_url: https://github.com/myllynen/misc.git
    #credential: Test Org - SCM Credential
    scm_clean: false
    scm_update_on_launch: false
    #scm_update_cache_timeout: 30
    update_project: "{{ aap_scm_update_projects | default(false) }}"

controller_inventories_test_org_test:
  - name: Test Org - EE localhost
    description: EE localhost inventory
    organization: Test Org

  - name: Test Org - Test Inventory
    description: Inventory for testing
    organization: Test Org
    roles:
      use:
        teams:
          - t_developers
          - t_operators

controller_hosts_test_org:
  - name: localhost
    inventory: Test Org - EE localhost
    enabled: true
    variables:
      ansible_connection: local

controller_inventory_sources_test_org:
  - name: Test Org - Test Git Inventory Source
    description: Inventory Source for testing
    organization: Test Org
    execution_environment: Control Plane Execution Environment
    inventory: Test Org - Test Inventory
    source: scm
    source_project: Test Org - Test Project for Git Inventory
    source_path: inventory
    overwrite: true
    overwrite_vars: true
    update_on_launch: false
    #update_cache_timeout: 30
    #verbosity: 2

controller_templates_test_org:
  - name: Test Org - Refresh Red Hat token
    description: Refresh Red Hat Hybrid Cloud Console authentication token
    job_type: run
    organization: Test Org
    inventory: Test Org - EE localhost
    project: Test Org - Test Project
    playbook: redhat_token_refresh.yml
    credentials: Test Org - Red Hat Automation Hub

  - name: Test Org - Test Job Template
    description: Job template for testing
    job_type: run
    organization: Test Org
    inventory: Test Org - Test Inventory
    project: Test Org - Test Project
    playbook: debug.yml
    #credentials: Test Org - Machine Credential
    #limit: localhost
    verbosity: 0
    #extra_vars:
    #  ansible_connection: local
    roles:
      execute:
        teams:
          - t_api_users

  - name: Test Org - Test Random Failure
    description: Random failure for testing
    job_type: run
    organization: Test Org
    inventory: Test Org - Test Inventory
    project: Test Org - Test Project
    playbook: random_fail.yml
    #credentials: Test Org - Machine Credential
    #limit: localhost
    verbosity: 0
    extra_vars:
      message: This might fail

controller_workflows_test_org:
  - name: Test Org - Test Workflow Job Template
    description: Workflow for testing
    organization: Test Org
    inventory: Test Org - Test Inventory
    #limit: localhost
    extra_vars:
      message: Message from workflow
    simplified_workflow_nodes:
      - identifier: node1
        all_parents_must_converge: false
        unified_job_template: Test Org - Test Random Failure
        lookup_organization: Test Org
        credentials: []
        success_nodes:
          - node10
        failure_nodes:
          - node20
        always_nodes: []
      - identifier: node10
        approval_node:
          name: Test Approval
          description: Approval step for testing
          timeout: 0
        success_nodes:
          - node11
      - identifier: node11
        unified_job_template: Test Org - Test Job Template
        lookup_organization: Test Org
      - identifier: node20
        unified_job_template: Test Org - Test Random Failure
        lookup_organization: Test Org

controller_schedules_test_org:
  - name: Test Org - Refresh Red Hat token
    description: Scheduled Red Hat token refresh
    unified_job_template: Test Org - Refresh Red Hat token
    organization: Test Org
    inventory: Test Org - EE localhost
    rrule: DTSTART;TZID=Europe/Helsinki:20260101T020202 RRULE:FREQ=WEEKLY;INTERVAL=1
    enabled: true
