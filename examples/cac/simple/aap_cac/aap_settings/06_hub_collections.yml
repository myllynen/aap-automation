# Ansible Automation Platform hub configuration - collections

hub_configuration_namespace_secure_logging: false
hub_configuration_collection_secure_logging: false
hub_configuration_publish_secure_logging: false

hub_configuration_collection_remote_secure_logging: false
hub_configuration_collection_repository_secure_logging: false
hub_configuration_collection_repository_sync_secure_logging: false

redhat_auth_url: https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
redhat_auth_token: "{{ aap_redhat_hub_token }}"

aap_request_timeout: 5
hub_repository: staging
hub_auto_approve: true
hub_overwrite_existing: true
aap_configuration_working_dir: /var/tmp

aap_configuration_async_retries: 100
aap_configuration_async_delay: 6


hub_namespaces:
  - name: myllynen
    company: myllynen
    email: myllynen@redhat.com
    avatar_url: https://avatars.githubusercontent.com/u/24413632
    description: Collections from myllynen's GitHub repositories

# This is mutually exclusive with hub_custom_collections
#hub_collection_list:
#  - collection_name: custom.example_collection
#    collection_local_path: /tmp/collections/custom.example_collection-1.2.3

hub_custom_collections:
  - collection_name: myllynen.rhel_ansible_roles
    git_url: https://github.com/myllynen/rhel-ansible-roles
    version: v3.4.10

  - collection_name: myllynen.rhel_image
    git_url: https://github.com/myllynen/rhel-image
    version: v2.2.2

  - collection_name: myllynen.windows_ansible_roles
    git_url: https://github.com/myllynen/windows-ansible-roles
    version: v6.0.1
    #key_file:
    #ssh_opts:

hub_collection_remotes:
  - name: rh-certified
    url: https://console.redhat.com/api/automation-hub/content/published/
    auth_url: "{{ redhat_auth_url if redhat_auth_token is defined else omit }}"
    token: "{{ redhat_auth_token | default(omit) }}"
    tls_validation: true
    download_concurrency: 10
    max_retries: 1
    rate_limit: 8
    signed_only: true
    policy: immediate
    sync_dependencies: true
    requirements:
      - name: ansible.controller
        version: '>=4.8.2'
      - name: ansible.eda
        version: '>=2.12.1'
      - name: ansible.hub
        version: '>=1.1.0'
      - name: ansible.mcp
        version: '>=1.1.0'
      - name: ansible.platform
        version: '>=2.7.20260630'
      - name: ansible.posix
        version: '>=2.2.0'
      - name: ansible.utils
        version: '>=6.0.3'
      - name: ansible.windows
        version: '>=3.6.1'
      - name: chocolatey.chocolatey
        version: '>=1.6.0'
      - name: kubernetes.core
        version: '>=6.4.0'
      - name: microsoft.ad
        version: '>=1.11.0'
      - name: microsoft.mecm
        version: '>=1.0.0'
      - name: redhat.rhel_idm
        version: '>=1.16.0'
      - name: redhat.rhel_system_roles
        version: '>=1.120.5'
      - name: redhat.satellite
        version: '>=5.11.0'
      - name: redhat.satellite_operations
        version: '>=4.0.0'

  - name: validated
    url: https://console.redhat.com/api/automation-hub/content/validated/
    auth_url: "{{ redhat_auth_url if redhat_auth_token is defined else omit }}"
    token: "{{ redhat_auth_token | default(omit) }}"
    tls_validation: true
    download_concurrency: 10
    max_retries: 1
    rate_limit: 8
    signed_only: true
    policy: immediate
    # XXX Dependency sync is not supported/working
    # XXX across different repositories as of now.
    sync_dependencies: false
    requirements:
      - name: ansible.mcp_builder
        version: '>=1.0.3'
      - name: infra.aap_configuration
        version: '>=4.7.0'
      - name: infra.aap_utilities
        version: '>=3.4.0'
      - name: infra.ee_utilities
        version: '>=4.4.0'
      - name: infra.leapp
        version: '>=1.7.3'
      - name: infra.lvm_snapshots
        version: '>=2.1.3'
      - name: infra.mecm_ops
        version: '>=1.0.2'
      - name: infra.windows_ops
        version: '>=2.0.1'

  - name: community
    url: https://galaxy.ansible.com/api/
    tls_validation: true
    download_concurrency: 10
    max_retries: 1
    rate_limit: 8
    signed_only: false
    policy: immediate
    sync_dependencies: true
    requirements:
      # Define versions to avoid syncing
      # hundreds of prehistoric versions
      - name: community.crypto
        version: '>=2.26.9'
      - name: community.general
        version: '>=11.4.9'
      - name: community.windows
        version: '>=3.2.0'
      - name: containers.podman
        version: '>=1.20.2'

hub_collection_repositories:
  - name: rh-certified
    remote: rh-certified
    retain_repo_versions: 3
    sync: true
    wait: true
  - name: validated
    remote: validated
    retain_repo_versions: 3
    sync: true
    wait: true
  - name: community
    remote: community
    retain_repo_versions: 3
    sync: true
    wait: true
