# Ansible Automation Platform controller configuration - credential types

controller_configuration_credential_types_secure_logging: false

controller_credential_types:
  - name: Generic API Token
    inputs:
      fields:
        - id: url
          type: string
          label: API Service URL
          help_text: The URL of the API service to connect to.
        - id: auth_url
          type: string
          label: Auth Server URL
          help_text: The URL of an authentication server, optional.
        - id: token
          type: string
          label: API Token
          secret: true
          help_text: A token to use for authentication, optional.
        - id: refresh_token
          type: string
          label: API Refresh Token
          secret: true
          help_text: A refresh token for renewing the token, optional.
      required:
        - url
    injectors:
      env:
        GENERIC_API_URL: "{  { url }}"
        GENERIC_API_AUTH_URL: "{  { auth_url }}"
        GENERIC_API_TOKEN: "{  { token }}"
        GENERIC_API_REFRESH_TOKEN: "{  { refresh_token }}"

  - name: Kerberos
    inputs:
      fields:
        - id: username
          type: string
          label: Username
        - id: password
          type: string
          label: Password
          secret: true
        - id: default_realm
          type: string
          label: Default Realm
        - id: kdc
          type: string
          label: KDC
          help_text: Optional KDC, use only if KDC DNS lookup not working
      required:
        - username
        - password
        - default_realm
    injectors:
      env:
        KRB5_CONFIG: "{  { tower.filename }}"
      file:
        template: |-
          [libdefaults]
          default_realm = {  { default_realm | upper }}
          dns_canonicalize_hostname = fallback
          dns_lookup_kdc = {  % if kdc %}false{  % else %}true{  % endif %}
          dns_lookup_realm = true
          forwardable = true
          rdns = false
          #udp_preference_limit = 1
          [realms]
          {  { default_realm | upper }} = {
            {  % if kdc %}kdc = {  { kdc }}{  % endif %}
          }
          [domain_realm]
          {  { default_realm | lower }} = {  { default_realm | upper }}
      extra_vars:
        ansible_user: "{  { username }}"
        ansible_password: "{  { password }}"
