# Ansible Automation Platform gateway configuration - authentication

gateway_authenticators_secure_logging: false

gateway_authenticators:
  - name: Local Database Authenticator
    order: 1
    type: ansible_base.authentication.authenticator_plugins.local
    slug: local-database-authenticator
    enabled: true
    create_objects: true
    remove_users: false
    configuration:
      fallback_authentication:
        - aap_gateway_api.authentication.fallbacks.controller

  - name: Microsoft Active Directory
    order: 2
    type: ansible_base.authentication.authenticator_plugins.ldap
    slug: microsoft-active-directory
    enabled: false
    create_objects: true
    remove_users: true
    configuration:
      # Per-environment AAP setting example
      SERVER_URI: "{{ aap_ad_server_uri }}"
      START_TLS: true
      #BIND_DN: "{{ aap_ad_bind_username }}"
      #BIND_PASSWORD: "{{ aap_ad_bind_password }}"
      CONNECTION_OPTIONS: {}
      # https://access.redhat.com/solutions/7093912
      GROUP_TYPE: ActiveDirectoryGroupType
      GROUP_TYPE_PARAMS:
        name_attr: cn
      GROUP_SEARCH:
        - ou=groups,ou=corp,dc=example,dc=com
        - SCOPE_SUBTREE
        - "(objectClass=group)"
      #USER_DN_TEMPLATE: sAMAccountName=%(user)s,ou=users,ou=corp,dc=example,dc=com
      USER_ATTR_MAP:
        first_name: givenName
        last_name: sn
        email: mail
      USER_SEARCH:
        -
          - ou=users,ou=corp,dc=example,dc=com
          - SCOPE_SUBTREE
          - "(sAMAccountName=%(user)s)"

  - name: Red Hat IdM
    order: 3
    type: ansible_base.authentication.authenticator_plugins.ldap
    slug: redhat-idm
    enabled: false
    create_objects: true
    remove_users: true
    configuration:
      SERVER_URI:
        - ldap://idm.example.com:389
      START_TLS: false
      #BIND_DN: "{{ aap_idm_bind_username }}"
      #BIND_PASSWORD: "{{ aap_idm_bind_password }}"
      CONNECTION_OPTIONS: {}
      GROUP_TYPE: PosixGroupType
      GROUP_TYPE_PARAMS:
        name_attr: cn
      GROUP_SEARCH:
        - cn=groups,cn=accounts,dc=example,dc=com
        - SCOPE_SUBTREE
        - "(objectClass=posixgroup)"
      #USER_DN_TEMPLATE: uid=%(user)s,cn=users,cn=accounts,dc=example,dc=com
      USER_ATTR_MAP:
        first_name: givenName
        last_name: sn
        email: mail
      USER_SEARCH:
        -
          - cn=users,cn=accounts,dc=example,dc=com
          - SCOPE_SUBTREE
          - "(uid=%(user)s)"

  - name: Keycloak
    order: 4
    type: ansible_base.authentication.authenticator_plugins.keycloak
    slug: keycloak-auth
    enabled: false
    create_objects: true
    remove_users: true
    configuration:
      ACCESS_TOKEN_URL: https://keycloak.example.com:8443/realms/aap/protocol/openid-connect/token
      AUTHORIZATION_URL: https://keycloak.example.com:8443/realms/aap/protocol/openid-connect/auth
      GROUPS_CLAIM: roles
      KEY: aapoidc
      PUBLIC_KEY: "{{ aap_keycloak_public_key | default('changeme') }}"
      SECRET: "{{ aap_keycloak_secret | default('changeme') }}"

# Additional examples, unused by default
additional_gateway_authenticators:
  - name: Okta
    type: ansible_base.authentication.authenticator_plugins.saml
    slug: okta
    order: 5
    enabled: false
    create_objects: true
    remove_users: true
    configuration:
      CALLBACK_URL: https://gateway.example.com/api/gateway/social/complete/ansible_base-authentication-authenticator_plugins-saml__okta/
      IDP_ENTITY_ID: http://www.okta.com/0123456789abcdefg
      IDP_URL: https://okta.example.com/app/aap/0123456789abcdefg/sso/saml
      IDP_ATTR_USER_PERMANENT_ID: login
      IDP_ATTR_USERNAME: login
      IDP_ATTR_FIRST_NAME: firstName
      IDP_ATTR_LAST_NAME: lastName
      IDP_ATTR_EMAIL: email
      IDP_GROUPS: member-of
      IDP_X509_CERT: "{{ aap_okta_idp_cert }}"
      ORG_INFO:
        en-US:
          displayname: Acme AAP
          name: Ansible Automation Platform
          url: https://gateway.example.com
      SECURITY_CONFIG:
        requestedAuthnContext: false
      ADDITIONAL_UNVERIFIED_ARGS:
        GET_ALL_EXTRA_DATA: true
      EXTRA_DATA: []
      SP_ENTITY_ID: https://gateway.example.com
      SP_PUBLIC_CERT: "{{ aap_okta_sp_cert }}"
      SP_PRIVATE_KEY: "{{ aap_okta_sp_private_key }}"
      SP_EXTRA:
        requestedAuthnContext: false
      SUPPORT_CONTACT:
        emailAddress: admin@example.com
        givenName: Admin User
      TECHNICAL_CONTACT:
        emailAddress: admin@example.com
        givenName: Admin User
